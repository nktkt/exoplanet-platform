version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: exoplanet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: exoplanet
      POSTGRES_PASSWORD: exoplanet
      POSTGRES_DB: exoplanet
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exoplanet -d exoplanet"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: exoplanet-platform:local
    container_name: exoplanet-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      EXOPLANET_ENVIRONMENT: production
      EXOPLANET_LOG_LEVEL: INFO
      EXOPLANET_STORAGE__DATABASE_URL: postgresql+psycopg2://exoplanet:exoplanet@postgres:5432/exoplanet
      EXOPLANET_API__HOST: 0.0.0.0
      EXOPLANET_API__PORT: "8000"
    ports:
      - "8000:8000"
    command: ["exoplanet-api"]

  dashboard:
    image: exoplanet-platform:local
    container_name: exoplanet-dashboard
    restart: unless-stopped
    depends_on:
      - api
    environment:
      EXOPLANET_STORAGE__DATABASE_URL: postgresql+psycopg2://exoplanet:exoplanet@postgres:5432/exoplanet
    ports:
      - "8501:8501"
    command: ["exoplanet-dashboard"]

volumes:
  postgres_data:
    name: exoplanet_postgres_data
